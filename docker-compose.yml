services:
  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: letschat-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - ollama-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: letschat-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - ollama-network

  # Ollama Model Loader (runs once to pull models)
  ollama-setup:
    image: ollama/ollama:latest
    container_name: letschat-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - ollama-network
    entrypoint: /bin/sh
    command:
      - -c
      - >-
        sleep 10 &&
        export OLLAMA_HOST=http://ollama:11434 &&
        echo "Pulling llama3.2..." &&
        ollama pull llama3.2 &&
        echo "Pulling all-minilm..." &&
        ollama pull all-minilm &&
        echo "Pulling nomic-embed-text..." &&
        ollama pull nomic-embed-text &&
        echo "Pulling gemma3:12b..." &&
        ollama pull gemma3:12b &&
        echo "Listing models:" &&
        ollama list &&
        echo "Done!"
    restart: "no"

networks:
  ollama-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
  qdrant-data:
    driver: local
